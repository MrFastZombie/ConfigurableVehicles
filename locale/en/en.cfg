[mod-name]
ConfigurableVehicles=Configurable Vehicles

[mod-description]
ConfigurableVehicles=Lets you customize the properties of the vanilla vehicles.

[CV-names]
swap-sides=Swap exit side
[CV-descriptions]
swap-sides=Swaps the exit side of the vehicle. By default, the player will exit from the left side of a vehicle.

[mod-setting-name]
extra-vehicles-swap-side=Extra Vehicles: Swap exit side
[mod-setting-description]
extra-vehicles-swap-side="(String) Use this to swap the exit side on modded vehicles. Format is a comma-seperated list.\n\nTo get the valid name of a vehicle, put your mouse over it and press [color=#F84802]CTRL + SHIFT + F[/color] to open the prototype window, and use the value under 'PrototypeBase' next to 'name'.\n[img=utility/warning_white]Do NOT include spaces!"